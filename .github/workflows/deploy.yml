name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git rm --cached *.sav --ignore-unmatch

          rm -rf .git
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "Deploy clean codebase without historical binaries"

          git remote add hf https://Charlzee0:$HF_TOKEN@huggingface.co/spaces/Charlzee0/ltd-extractor-api
          git push -f hf HEAD:main